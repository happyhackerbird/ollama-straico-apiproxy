name: Build and push to GHCR (happyhackerbird fork)

# Builds the patched proxy and publishes to ghcr.io/happyhackerbird/ollama-straico-apiproxy.
# This fork carries patches against upstream (real-usage from straico,
# coin-price under usage.straico_coins) consumed by scope-agent CI canaries.
#
# Fixes the upstream docker-image.yml's `./Dockerfile` (capital D) vs the
# on-disk lowercase `dockerfile` — case-sensitive on Linux runners.

on:
  push:
    branches:
      - 'feature/**'
      - 'main'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ollama-straico-apiproxy
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'feature/return-real-usage-from-straico') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
